<!DOCTYPE html>
<html>
  <head>

    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <link rel="stylesheet" href="style.css" media="screen" title="no title">

  </head>
  <body>

    <section class="toggle-show-more">
      <div class="toggle-show-more-list">
          <div class="toggle-show-more-item">
            <!-- Image Crop -->
            <section class="image-crop">
              <div class="image-item-crop">
                <img src="/img/pexels-photo-117422.jpeg" alt="">
              </div>
            </section>
          </div>
          <div class="toggle-show-more-item">
            <!-- Image Crop -->
            <section class="image-crop">
              <div class="image-item-crop">
                <img src="/img/pexels-photo-117422.jpeg" alt="">
              </div>
            </section>
          </div>
          <div class="toggle-show-more-item">
            <!-- Image Crop -->
            <section class="image-crop">
              <div class="image-item-crop">
                <img src="/img/pexels-photo-117422.jpeg" alt="">
              </div>
            </section>
          </div>
          <div class="toggle-show-more-item">
            <!-- Image Crop -->
            <section class="image-crop">
              <div class="image-item-crop">
                <img src="/img/pexels-photo-117422.jpeg" alt="">
              </div>
            </section>
          </div>

            <!-- Image Crop -->
            <section class="image-crop">
              <div class="image-item-crop">
                <img src="/img/pexels-photo-117422.jpeg" alt="">
              </div>
            </section>
          </div>    
          <div class="toggle-show-more-item">
            <!-- Image Crop -->
            <section class="image-crop">
              <div class="image-item-crop">
                <img src="/img/pexels-photo-117422.jpeg" alt="">
              </div>
            </section>
          </div>
        <div class="clearfix">&nbsp;</div>
        <div class="toggle-show-more-btn">
          <button type="button" class="btnToggleShowMore">More...</button>
        </div>
        <div class="clearfix">&nbsp;</div>
      </div>
      </div>
    </section>

    <script type='text/javascript'>

        jQuery(document).ready(function($){

          $(".toggle-show-more .toggle-show-more-list").each(function(){
            var productlist = $(this).find('.toggle-show-more-item:gt(2)');

            productlist.hide();

            $(this).find('.btnToggleShowMore').click(function(){
              var btnToggleShowMore = $(this);
              productlist.slideToggle(function(){
                if(productlist.is(':visible')){
                  btnToggleShowMore.text('Less..');
                }else{
                  btnToggleShowMore.text('More..');
                }
              });
            })
          });

      });

    </script>
  
  </body>
</html>
