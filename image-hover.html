      <div class="image-item-crop hover-resize">
        <img src="/img/pexels-photo-117422.jpeg" alt="">

    </section>

    <section class="image-crop hover-border">

      </div>
    </section>
</section>

<div class="clearfix"><h1>Hover Overlap Text</h1></div>

      <div class="image-item-crop ">
        <img src="/img/pexels-photo-117422.jpeg" alt="">
